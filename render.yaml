services:
  - type: web
    name: duty-shuffle
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile.prod
    healthCheckPath: /
    autoDeploy: true
    
    # ビルド環境設定
    buildCommand: npm install --legacy-peer-deps && npx prisma generate
    
    # 環境変数設定
    envVars:
      - key: DATABASE_URL
        scope: run
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: PRISMA_SKIP_ENGINE_CHECK
        value: "true"
      - key: NODE_ENV
        value: production
    
    # デプロイ前コマンド（マイグレーション実行）
    preDeployCommand: npx prisma migrate deploy
    
    # スタートアップコマンド
    startCommand: /usr/local/bin/start.sh
    
    # ポート設定
    ports:
      - port: 10000
        protocol: HTTP

databases:
  - name: duty-shuffle-db
    databaseName: duty_shuffle
    plan: free
    region: oregon
    ipAllowList: []
