# fly.io 設定ファイル
app = "dutyshuffle"
primary_region = "nrt"

[build]
  dockerfile = "./Dockerfile"

# HTTPサービス設定
[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    timeout = "5s"
    type = "http"
    method = "GET"
    path = "/top.php"

# メモリとCPU設定
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

# マイグレーション設定（注：タイムアウトの場合はコメントアウト）
# [deploy]
#   release_command = "npx prisma migrate deploy"
#   release_command_timeout = "300s"

# 環境変数
[env]
  NODE_ENV = "production"
  PHP_MEMORY_LIMIT = "512M"
  PHP_MAX_EXECUTION_TIME = "30"
