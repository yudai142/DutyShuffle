version: '3.8'

services:
  web:
    build: .
    container_name: php-apache
    ports:
      - "8080:80"
      - "5555:5555"
    volumes:
      - ./:/var/www/html
    networks:
      - app-network
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://duty_shuffle:duty_shuffle@postgres:5432/duty_shuffle

  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=duty_shuffle
      - POSTGRES_PASSWORD=duty_shuffle
      - POSTGRES_DB=duty_shuffle
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duty_shuffle"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge